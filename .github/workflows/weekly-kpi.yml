name: Weekly delivery KPI

# Re-tabulates a rolling recent window every Monday (stateless -- so weeks heal
# as late/backfilled data arrives) and commits the pivots + heatmaps under
# reports/<date>/. Reads the tracked inputs instrument_status.csv, baseline_overrides.csv,
# original_expected.csv. C1/C3 only -- C2 (crawl_science) is too heavy for a hosted
# runner (opens dozens of multi-GB zarr -> OOM), so it's run out-of-band; see README.

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-kpi
  cancel-in-progress: false

jobs:
  kpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Crawl + compute + plot
        run: |
          DATE=$(date -u +%F)
          echo "RUN_DATE=$DATE" >> "$GITHUB_ENV"
          crawl_archive --date "$DATE"          # C1/C3 delivered side (rolling ~3 months)
          compute_kpi --date "$DATE"            # folds in C2 if weekly_science.csv was committed
          plot_kpi --metric technical --date "$DATE"
          plot_kpi --metric retention --date "$DATE"
          # NOTE: crawl_science (C2) is NOT run here -- it opens dozens of multi-GB zarr from S3
          # and would OOM a 2-vCPU/7-GB hosted runner. Run it out-of-band (local / self-hosted)
          # and commit reports/<date>/weekly_science.csv; compute_kpi picks it up. plot science there too.

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "Weekly delivery KPI ${RUN_DATE}"
          git push
