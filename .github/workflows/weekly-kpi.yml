name: Weekly delivery KPI

# Re-tabulates a rolling recent window every Monday (stateless -- so weeks heal
# as late/backfilled data arrives) and commits the pivots + heatmaps under
# reports/<date>/. Reads the tracked inputs instrument_status.csv, baseline_overrides.csv,
# original_expected.csv.

on:
  schedule:
    - cron: "0 12 * * 1"   # Mondays 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-kpi
  cancel-in-progress: false

jobs:
  kpi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Crawl + compute + plot
        run: |
          DATE=$(date -u +%F)
          echo "RUN_DATE=$DATE" >> "$GITHUB_ENV"
          crawl_archive --date "$DATE"          # C1/C3 delivered side (rolling ~3 months)
          crawl_science --date "$DATE"          # C2 QARTOD pass-rate from zarr (slow)
          compute_kpi --date "$DATE"            # all outputs land in reports/$DATE/
          plot_kpi --metric technical --date "$DATE"
          plot_kpi --metric retention --date "$DATE"
          plot_kpi --metric science --date "$DATE"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "Weekly delivery KPI ${RUN_DATE}"
          git push
